<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContiNUS - Working Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="window-mockup">
      <div class="window-header">
        <div class="dots">
          <div class="dot red"></div>
          <div class="dot yellow"></div>
          <div class="dot green"></div>
        </div>
        <div class="search-bar">⚙️ Calculating Overlap...</div>
      </div>

      <div class="engine-container">
        <div class="combination-title">
          <select id="primary-select">
            <option value="AI_MAJOR">AI Major</option>
            <option value="CS_MAJOR">Computer Science Major</option>
          </select>
          <span class="plus-icon">+</span>
          <select id="secondary-select">
            <option value="MATH_2ND_MAJOR">Second Major in Mathematics</option>
            <option value="BIZ_2ND_DEGREE">Double Degree in Business</option>
            <option value="DATA_MINOR">Minor in Data Engineering</option>
          </select>
        </div>

        <div class="progress-container">
          <div id="bar-primary" class="bar-segment" title="Primary MCs"></div>
          <div
            id="bar-overlap"
            class="bar-segment"
            title="Overlapping MCs"
          ></div>
          <div
            id="bar-secondary"
            class="bar-segment"
            title="Secondary MCs"
          ></div>
        </div>
        <div class="progress-labels">
          <span>Primary Major</span>
          <span id="label-overlap">Overlap (0 MCs)</span>
          <span>Second Degree / Minor</span>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-value" id="stat-standard">160</div>
            <div class="stat-label">Standard Graduation MCs</div>
          </div>
          <div class="stat-box highlight">
            <div class="stat-value green" id="stat-overlap">0</div>
            <div class="stat-label">Overlapping MCs Detected</div>
          </div>
          <div class="stat-box">
            <div class="stat-value red" id="stat-total">160</div>
            <div class="stat-label">New Total MCs Required</div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
